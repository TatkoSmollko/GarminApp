name: Issue Branch

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  create-branch:
    if: github.event.label.name == 'codex-ready'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute branch name
        id: branch
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-40 | sed 's/^-//' | sed 's/-$//')
          BRANCH="codex/issue-${ISSUE_NUMBER}-${SLUG}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create branch if missing
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch already exists: $BRANCH_NAME"
            exit 0
          fi
          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const branch = "${{ steps.branch.outputs.name }}";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Created branch \`${branch}\` for Codex work.`
            });
