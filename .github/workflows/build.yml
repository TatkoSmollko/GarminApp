name: Build & Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  build:
    name: Build .iq package
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Install connect-iq-sdk-manager-cli ──────────────────────────────
      - name: Install connect-iq-sdk-manager
        run: |
          DEB_URL="https://github.com/lindell/connect-iq-sdk-manager-cli/releases/download/v0.8.4/connect-iq-sdk-manager-cli_0.8.4_amd64.deb"
          curl -sSL "$DEB_URL" -o /tmp/ciq-cli.deb
          sudo dpkg -i /tmp/ciq-cli.deb
          connect-iq-sdk-manager version

      # ── 3. Accept Garmin SDK licence & install SDK ─────────────────────────
      - name: Install Connect IQ SDK
        run: |
          # Create SDK directory so sdk list doesn't fail on first run
          mkdir -p "$HOME/.Garmin/ConnectIQ/Sdks"
          connect-iq-sdk-manager agreement accept
          # Extract latest semver from sdk list output (e.g. "7.4.3")
          LATEST_SDK=$(connect-iq-sdk-manager sdk list 2>/dev/null \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          echo "Installing SDK version: $LATEST_SDK"
          connect-iq-sdk-manager sdk download "$LATEST_SDK"
          connect-iq-sdk-manager sdk set "$LATEST_SDK"
          SDK_PATH=$(connect-iq-sdk-manager sdk current-path)
          echo "CIQ_SDK=$SDK_PATH" >> "$GITHUB_ENV"
          echo "SDK path: $SDK_PATH"

      # ── 4. Write developer signing key from GitHub secret ─────────────────
      #    Store the RAW PEM text as secret DEV_KEY_PEM (copy-paste the whole
      #    -----BEGIN PRIVATE KEY----- block including headers).
      #    Generate once locally:
      #      openssl genrsa -out key.pem 4096
      #      cat key.pem | pbcopy   ← paste as DEV_KEY_PEM secret
      - name: Write developer key
        env:
          DEV_KEY_PEM: ${{ secrets.DEV_KEY_PEM }}
        run: |
          echo "$DEV_KEY_PEM" > /tmp/dev_key.pem
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in /tmp/dev_key.pem -out /tmp/dev_key.der -nocrypt
          echo "Key ready ($(wc -c < /tmp/dev_key.der) bytes DER)"

      # ── 5. Download device definitions ────────────────────────────────────
      - name: Download device definitions
        run: |
          DEVICES="fr955 fr265 fr965 epix2 edge540 edge550 edge840 edge850 edge1040 edge1050 edgeexplore2 edgemtb"
          for dev in $DEVICES; do
            echo "Downloading device: $dev"
            connect-iq-sdk-manager devices download "$dev" \
              || connect-iq-sdk-manager device download "$dev" \
              || echo "WARN: $dev not available, skipping"
          done
          echo "=== Downloaded devices ==="
          ls "${HOME}/.Garmin/ConnectIQ/Devices/" 2>/dev/null || echo "WARNING: No devices directory found!"

      # ── 7. Java (monkeyc is a JVM tool) ───────────────────────────────────
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 8. Build .iq package (all devices from manifest.xml) ──────────────
      - name: Build .iq package
        working-directory: watch-app
        run: |
          MONKEYC="$CIQ_SDK/bin/monkeyc"
          mkdir -p dist

          # -e (package-app) reads devices from manifest.xml automatically — no -d needed
          "$MONKEYC" \
            -e \
            -f monkey.jungle \
            -y /tmp/dev_key.der \
            -o dist/LT1Test.iq \
            -r \
            -w \
            -l 1

          echo "Build complete:"
          ls -lh dist/LT1Test.iq

      # ── 9. Upload .iq as GitHub artifact ──────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LT1Test-${{ github.sha }}
          path: watch-app/dist/LT1Test.iq
          retention-days: 30

      # ── 7. On tagged release → attach .iq to GitHub Release ───────────────
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: watch-app/dist/LT1Test.iq
