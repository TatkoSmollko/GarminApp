name: Build & Package

on:
  push:
    branches: [master, main]
    paths:
      - "watch-app/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "watch-app/**"
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  build:
    name: Build .iq package
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Install connect-iq-sdk-manager-cli ──────────────────────────────
      - name: Install connect-iq-sdk-manager
        run: |
          DEB_URL="https://github.com/lindell/connect-iq-sdk-manager-cli/releases/download/v0.8.4/connect-iq-sdk-manager-cli_0.8.4_amd64.deb"
          curl -sSL "$DEB_URL" -o /tmp/ciq-cli.deb
          sudo dpkg -i /tmp/ciq-cli.deb
          connect-iq-sdk-manager version

      # ── 3. Accept Garmin SDK licence & install SDK ─────────────────────────
      - name: Install Connect IQ SDK
        run: |
          connect-iq-sdk-manager agreement accept
          # List available SDKs, pick latest, download and set it
          LATEST_SDK=$(connect-iq-sdk-manager sdk list | tail -1 | awk '{print $1}')
          echo "Installing SDK version: $LATEST_SDK"
          connect-iq-sdk-manager sdk download "$LATEST_SDK"
          connect-iq-sdk-manager sdk set "$LATEST_SDK"
          SDK_PATH=$(connect-iq-sdk-manager sdk current-path)
          echo "CIQ_SDK=$SDK_PATH" >> "$GITHUB_ENV"
          echo "SDK path: $SDK_PATH"

      # ── 4. Write developer signing key from GitHub secret ─────────────────
      #    Store your key as: Settings → Secrets → DEV_KEY_DER (base64-encoded)
      #    Generate once locally:
      #      openssl genrsa -out key.pem 4096
      #      openssl pkcs8 -topk8 -inform PEM -outform DER -in key.pem -out key.der -nocrypt
      #      base64 -i key.der | pbcopy   ← paste as DEV_KEY_DER secret
      - name: Write developer key
        run: |
          echo "${{ secrets.DEV_KEY_DER }}" | base64 -d > /tmp/dev_key.der

      # ── 5. Build .iq package (all devices from manifest.xml) ──────────────
      - name: Build .iq package
        working-directory: watch-app
        run: |
          MONKEYC="$CIQ_SDK/bin/monkeyc"

          # Extract device list from manifest.xml
          DEVICES=$(grep -oP '(?<=id=")[^"]+(?="/>)' manifest.xml | tr '\n' ';' | sed 's/;$//')
          echo "Target devices: $DEVICES"

          # Build production .iq package (no -t = no test mode)
          "$MONKEYC" \
            --package-app \
            --jungles monkey.jungle \
            --private-key /tmp/dev_key.der \
            --output dist/LT1Test.iq \
            --device "$DEVICES" \
            --warn \
            --typecheck gradual

          echo "Build complete:"
          ls -lh dist/LT1Test.iq

      # ── 6. Upload .iq as GitHub artifact ──────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LT1Test-${{ github.sha }}
          path: watch-app/dist/LT1Test.iq
          retention-days: 30

      # ── 7. On tagged release → attach .iq to GitHub Release ───────────────
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: watch-app/dist/LT1Test.iq
