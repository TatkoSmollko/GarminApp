name: Watch Build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-watch-app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Connect IQ SDK
        run: brew install --cask connectiq

      - name: Resolve SDK tools
        run: |
          SDK_ROOT=""

          for CFG in \
            "$HOME/.Garmin/ConnectIQ/current-sdk.cfg" \
            "$HOME/Library/Application Support/Garmin/ConnectIQ/current-sdk.cfg"
          do
            if [ -f "$CFG" ]; then
              SDK_ROOT="$(cat "$CFG")"
              break
            fi
          done

          if [ -z "$SDK_ROOT" ] && [ -d /Applications/ConnectIQ.app ]; then
            SDK_ROOT="$(find /Applications/ConnectIQ.app -type f -name monkeyc | head -n 1 | xargs dirname)"
            SDK_ROOT="${SDK_ROOT%/bin}"
          fi

          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT="$(find /opt/homebrew/Caskroom /usr/local/Caskroom -type f -name monkeyc 2>/dev/null | head -n 1 | xargs dirname)"
            SDK_ROOT="${SDK_ROOT%/bin}"
          fi

          if [ -z "$SDK_ROOT" ]; then
            echo "Unable to locate Connect IQ SDK installation"
            exit 1
          fi

          echo "SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "MONKEYC=$SDK_ROOT/bin/monkeyc" >> "$GITHUB_ENV"
          "$SDK_ROOT/bin/monkeyc" --version

      - name: Generate temporary developer key
        run: |
          mkdir -p "$HOME/.garmin"
          openssl genrsa -out "$HOME/.garmin/developer_key.pem" 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in "$HOME/.garmin/developer_key.pem" \
            -out "$HOME/.garmin/developer_key.der" \
            -nocrypt

      - name: Build IQ package
        run: |
          "$MONKEYC" -f watch-app/monkey.jungle \
            -o /tmp/lt1test.iq \
            -e \
            -y "$HOME/.garmin/developer_key.der"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-iq
          path: /tmp/lt1test.iq
          retention-days: 14
