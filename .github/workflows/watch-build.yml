name: Watch Build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-watch-app:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Connect IQ SDK
        run: brew install --cask connectiq

      - name: Generate temporary developer key
        run: |
          mkdir -p "$HOME/.garmin"
          openssl genrsa -out "$HOME/.garmin/developer_key.pem" 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in "$HOME/.garmin/developer_key.pem" \
            -out "$HOME/.garmin/developer_key.der" \
            -nocrypt

      - name: Build FR955 app
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test-fr955.prg \
            -d fr955 \
            -w \
            -y "$HOME/.garmin/developer_key.der"

      - name: Build FR265 app
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test-fr265.prg \
            -d fr265 \
            -w \
            -y "$HOME/.garmin/developer_key.der"

      - name: Build FR965 app
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test-fr965.prg \
            -d fr965 \
            -w \
            -y "$HOME/.garmin/developer_key.der"

      - name: Build epix2 app
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test-epix2.prg \
            -d epix2 \
            -w \
            -y "$HOME/.garmin/developer_key.der"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-prg
          path: /tmp/lt1test-*.prg
          retention-days: 14
