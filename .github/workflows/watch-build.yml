name: Watch Build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-watch-app:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local Garmin toolchain
        run: |
          command -v monkeyc
          monkeyc --version

      - name: Verify developer key
        run: |
          test -f "$HOME/.garmin/developer_key.der"

      - name: Build IQ package
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test.iq \
            -e \
            -y "$HOME/.garmin/developer_key.der"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-iq
          path: /tmp/lt1test.iq
          retention-days: 14
