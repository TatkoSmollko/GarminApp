name: Watch Build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-watch-app:
    runs-on: ubuntu-latest

    env:
      CIQ_SDK_VERSION: "7.4.3"   # bump when new SDK released

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Install lindell/connect-iq-sdk-manager-cli ───────────────────────
      # Proper headless CLI wrapper around the Garmin SDK Manager.
      # The official connectiq-sdk-manager-linux.zip is a GTK GUI app and
      # cannot run headlessly in CI.
      - name: Install connect-iq-sdk-manager-cli
        run: |
          CLI_URL=$(curl -s https://api.github.com/repos/lindell/connect-iq-sdk-manager-cli/releases/latest \
            | grep "browser_download_url.*linux_amd64" \
            | cut -d '"' -f 4)
          echo "Downloading: ${CLI_URL}"
          wget -q "${CLI_URL}" -O /tmp/ciq-cli.tar.gz
          tar -xzf /tmp/ciq-cli.tar.gz -C /tmp
          sudo mv /tmp/connect-iq-sdk-manager /usr/local/bin/connect-iq-sdk-manager
          connect-iq-sdk-manager --version

      # ── 2. Accept licence + download SDK ────────────────────────────────────
      - name: Cache Connect IQ SDK
        id: cache-ciq
        uses: actions/cache@v4
        with:
          path: ~/.config/connect-iq/sdks/${{ env.CIQ_SDK_VERSION }}
          key: ciq-sdk-${{ env.CIQ_SDK_VERSION }}

      - name: Download SDK ${{ env.CIQ_SDK_VERSION }}
        if: steps.cache-ciq.outputs.cache-hit != 'true'
        run: |
          connect-iq-sdk-manager agreement accept
          connect-iq-sdk-manager sdk download ${{ env.CIQ_SDK_VERSION }}

      - name: Set active SDK and add monkeyc to PATH
        run: |
          connect-iq-sdk-manager sdk set ${{ env.CIQ_SDK_VERSION }}
          SDK_BIN=$(connect-iq-sdk-manager sdk current-path --bin)
          echo "SDK bin: ${SDK_BIN}"
          echo "${SDK_BIN}" >> $GITHUB_PATH

      - name: Verify SDK
        run: monkeyc --version

      # ── 3. Temporary developer key (CI only — not the store key) ────────────
      - name: Generate developer key
        run: |
          openssl genrsa -out /tmp/dev_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in /tmp/dev_key.pem \
            -out /tmp/dev_key.der \
            -nocrypt

      # ── 4. Build all supported devices ──────────────────────────────────────
      - name: Build — fr955
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test-fr955.prg \
            -d fr955 -w \
            -y /tmp/dev_key.der

      - name: Build — fr265
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test-fr265.prg \
            -d fr265 -w \
            -y /tmp/dev_key.der

      - name: Build — fr965
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test-fr965.prg \
            -d fr965 -w \
            -y /tmp/dev_key.der

      - name: Build — epix2
        run: |
          monkeyc -f watch-app/monkey.jungle \
            -o /tmp/lt1test-epix2.prg \
            -d epix2 -w \
            -y /tmp/dev_key.der

      # ── 5. Upload compiled binaries as artifacts ─────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: watch-app-prg
          path: /tmp/lt1test-*.prg
          retention-days: 14
